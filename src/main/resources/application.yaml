# 服务器配置
server:
  port: 8080
  # 最大 HTTP 请求大小（支持 Base64 图片）
  max-http-form-post-size: 50MB

# Flask AI service (云端服务)
flask:
  base-url: ${FLASK_URL:http://8.148.94.242:8001}
  timeout-ms: 120000

# Compatibility: some components expect ai.rag.*
ai:
  rag:
    base-url: ${flask.base-url}
    timeout-ms: ${flask.timeout-ms}

# RAG服务配置
rag:
  service:
    url: ${flask.base-url}
    timeout-ms: ${flask.timeout-ms}

# Spring 配置
spring:
  application:
    name: mediacalbackend
  
  # 日志配置
  main:
    log-startup-info: true

  # 文件上传大小限制（支持 Base64 图片）
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # 数据源配置
  datasource:
    # JDBC URL
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DB:medicalassistant}?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    # 数据库用户名
    username: ${MYSQL_USER:appuser}
    # 数据库密码
    password: ${MYSQL_PASSWORD:App123456}
    # 驱动类名（MySQL 8.x）
    driver-class-name:  com.mysql.cj.jdbc.Driver

  # redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      # 把 java 对象转为 redis 操作的网络包的一个驱动
#      password: ${REDIS_PASSWORD:null}
      lettuce:
        # 对连接池做配置
        pool:
          max-active: 8 # 连接池最大连接数
          max-idle: 8 # 最大空闲连接数

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        # 消费者并发数（多线程消费）
        concurrency: 2
        max-concurrency: 5

# MyBatis配置
mybatis:
  # Mapper XML文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名包（XML中可以直接用类名，不用写全限定名）
  type-aliases-package: com.whu
  # 实体类型转换处理（LocalTime(List<LocalTime>) <-> VARCHAR）
  type-handlers-package: com.whu
  # MyBatis全局配置
  configuration:
    # 开启驼峰命名映射：create_time -> createTime
    map-underscore-to-camel-case: true
    # 打印SQL日志（开发环境）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 阿里云 DashScope 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  model: qwen-turbo  # 使用支持联网搜索的模型

# Redis Pub/Sub 判断的实例依据
app:
  instance-id: ${INSTANCE_ID:local}

# Agent 配置
agent:
  llm:
    enabled: true
  multi-turn:
    max-turns: 5          # 最大执行轮数
    timeout-ms: 30000     # 超时时间（毫秒）
    retry-enabled: true   # 启用重试
    max-retries: 2        # 最大重试次数

printpdf:
  output-dir: ./uploads/printpdf

# 日志配置
logging:
  level:
    root: INFO
    com.whu.medicalbackend: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet: DEBUG