worker_processes auto; # 自动探测服务器的 CPU 核心数量，启动对应数量的进程

events {
    worker_connections 1024; # 每一个进程的最大连接数， nginx 是基于事件驱动的 epoll IO多路复用
}

http {
    include      mime.types;
    default_type application/octet-stream;
    sendfile     on; # unix 系统提供的高效文件传输的系统调用，通过 DMA 将磁盘文件直接写到网卡的Socket缓冲区，不经过内核

    # ───────────────────────────────────────
    # 后端upstream（单实例，后续加实例只需在这里追加）
    # 容器间用服务名通信，不用 IP
    # ───────────────────────────────────────

    upstream backendLocal {
        server host.docker.internal:8080;
    }

    server {
        listen 80;
        server_name _;          # 暂不绑定域名，_ 表示接受所有

        # ───────────────────────────────────────
        # 头像静态文件服务
        # 访问路径：GET /avatar/file/avatar_1.svg
        # ───────────────────────────────────────
        location /avatar/file/ {
            alias /usr/share/nginx/static/avatar/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ───────────────────────────────────────
        # 药品图片（目录已挂载，后续直接放文件即可）
        # 访问路径：GET /images/xxx.png
        # ───────────────────────────────────────
        location /images/ {
            alias /usr/share/nginx/static/images/;
            expires 7d;
            add_header Cache-Control "public";
        }
        # ───────────────────────────────────────
        # WebSocket 代理
        # ───────────────────────────────────────
        location /ws {
            proxy_pass http://backendLocal;
            proxy_http_version 1.1;

            # WS 协议升级必须的 Header
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;

            # 长连接不超时（单位秒，0=不限制）
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ───────────────────────────────────────
        # API 反向代理
        # ───────────────────────────────────────
        location /api/ {
            proxy_pass http://backendLocal;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}