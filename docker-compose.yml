services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    command: --server-id=123 --log-bin=mysql-bin --binlog-format=ROW --binlog-row-image=FULL --character-set-server=utf8mb4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Root123456      # root 用户密码，自己设置
      MYSQL_DATABASE: medicalassistant     # 实际的数据库名
      MYSQL_USER: appuser                  # 给 SpringBoot 用的普通用户
      MYSQL_PASSWORD: App123456            # 普通用户密码，自己设置
    volumes:                               # 如果容器挂了，数据就没了，所以需要映射到磁盘
      - mysql_data:/var/lib/mysql          # 数据持久化
      - ./mysql_conf/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql  # 自动执行建表
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pRoot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server # --requirepass Redis123456  自己设置的密码
    networks:
      - app-net

  springboot1:
#    build: .                               # 用根目录的 Dockerfile 构建
    image: crpi-pcte2psh26cec7uk.cn-hangzhou.personal.cr.aliyuncs.com/medicalassistant/medicalassistant:latest
    container_name: springboot1
    restart: always

    expose:
      - "8080" # 容器内部服务使用的端口

    environment:
      MYSQL_HOST: mysql
      MYSQL_DB: medicalassistant           # 和上面 MYSQL_DATABASE 保持一致
      MYSQL_USER: appuser                  # 和上面 MYSQL_USER 保持一致
      MYSQL_PASSWORD: App123456            # 和上面 MYSQL_PASSWORD 保持一致
      REDIS_HOST: redis
      REDIS_PASSWORD: Redis123456          # 和上面 redis 密码保持一致
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      FLASK_URL: http://8.148.94.242:8001         #  Flask
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      INSTANCE_ID: instance-a
    depends_on:
      - mysql
      - redis
    networks:
      - app-net

  springboot2:
    #    build: .                               # 用根目录的 Dockerfile 构建
    image: crpi-pcte2psh26cec7uk.cn-hangzhou.personal.cr.aliyuncs.com/medicalassistant/medicalassistant:latest
    container_name: springboot2
    restart: always

    expose:
      - "8080" # 容器内部服务使用的端口

    environment:
      MYSQL_HOST: mysql
      MYSQL_DB: medicalassistant           # 和上面 MYSQL_DATABASE 保持一致
      MYSQL_USER: appuser                  # 和上面 MYSQL_USER 保持一致
      MYSQL_PASSWORD: App123456            # 和上面 MYSQL_PASSWORD 保持一致
      REDIS_HOST: redis
      REDIS_PASSWORD: Redis123456          # 和上面 redis 密码保持一致
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      FLASK_URL: http://8.148.94.242:8001         #  Flask
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      INSTANCE_ID: instance-b
    depends_on:
      - mysql
      - redis
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/static/avatar:/usr/share/nginx/static/avatar:ro
      - ./nginx/static/images:/usr/share/nginx/static/images:ro
#    depends_on:
#      - springboot1
#      - springboot2
    networks:
      - app-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s  # 给 RabbitMQ 足够的启动时间
    networks:
      - app-net

  canal:
    image: canal/canal-server:v1.1.8
    container_name: canal
    depends_on:
#      mysql:
#        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./canal-config/canal.properties:/home/admin/canal-server/conf/canal.properties
      - ./canal-config/example/instance.properties:/home/admin/canal-server/conf/example/instance.properties
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  mysql_data:
